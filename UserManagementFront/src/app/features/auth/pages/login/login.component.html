<form [formGroup]="loginForm" (ngSubmit)="onSubmit()" class="h-full flex flex-col">
  <div class="mb-5">
    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">E-mail</label>
    <input
      type="email"
      formControlName="email"
      class="w-full px-4 py-3 bg-gray-950 border border-gray-800 focus:border-gray-600 outline-none text-white placeholder-gray-700 transition-colors"
      placeholder="seu@email.com"
    />
  </div>

  <div class="mb-5">
    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Senha</label>
    <input
      type="password"
      formControlName="password"
      class="w-full px-4 py-3 bg-gray-950 border border-gray-800 focus:border-gray-600 outline-none text-white placeholder-gray-700 transition-colors"
      placeholder="••••••"
    />
  </div>

  <div class="text-right mb-8">
    <a routerLink="/forgot-password" class="text-xs text-gray-500 hover:text-gray-300 transition-colors uppercase tracking-wider">
      Esqueceu a senha?
    </a>
  </div>

  @if (errorMessage) {
    <div class="mb-5 p-3 text-sm bg-gray-900 text-gray-300 border border-gray-800">
      {{ errorMessage }}
    </div>
  }

  <button
    type="submit"
    [disabled]="isLoading"
    class="w-full bg-green-700 text-gray-950 py-4 px-4 text-sm font-medium hover:bg-green-500 transition-colors disabled:opacity-50 mt-auto tracking-wide"
  >
    {{ isLoading ? 'ENTRANDO...' : 'ENTRAR' }}
  </button>

  <p class="text-center mt-4 text-xs text-gray-600">
    Não tem uma conta? 
    <button 
      type="button"
      (click)="switchToRegister()" 
      class="text-white hover:text-gray-300 transition-colors ml-1 bg-transparent border-0 p-0 underline-offset-2 hover:underline cursor-pointer"
    >
      Cadastre-se
    </button>
  </p>
</form>
