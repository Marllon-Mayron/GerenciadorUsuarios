<form [formGroup]="registerForm" (ngSubmit)="onSubmit()" class="h-full flex flex-col">

  <div class="mb-5">
    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Nome completo</label>
    <input
      type="text"
      formControlName="name"
      class="w-full px-4 py-3 bg-gray-950 border border-gray-800 focus:border-gray-600 outline-none text-white placeholder-gray-700 transition-colors"
      placeholder="Seu nome"
    />
  </div>


  <div class="mb-5">
    <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">E-mail</label>
    <input
      type="email"
      formControlName="email"
      class="w-full px-4 py-3 bg-gray-950 border border-gray-800 focus:border-gray-600 outline-none text-white placeholder-gray-700 transition-colors"
      placeholder="seu@email.com"
    />
  </div>

  <div class="flex gap-4 mb-6">
    <div class="flex-1">
      <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Senha</label>
      <input
        type="password"
        formControlName="password"
        class="w-full px-4 py-3 bg-gray-950 border border-gray-800 focus:border-gray-600 outline-none text-white placeholder-gray-700 transition-colors"
        placeholder="••••••"
      />
    </div>

    <div class="flex-1">
      <label class="block text-xs font-medium text-gray-400 uppercase tracking-wider mb-2">Confirmar</label>
      <input
        type="password"
        formControlName="confirmPassword"
        class="w-full px-4 py-3 bg-gray-950 border border-gray-800 focus:border-gray-600 outline-none text-white placeholder-gray-700 transition-colors"
        placeholder="••••••"
      />
    </div>
  </div>

  @if (message) {
    <div class="mb-5 p-3 text-sm border" 
         [class.bg-gray-900]="messageType === 'success'" 
         [class.text-gray-300]="messageType === 'success'"
         [class.border-gray-700]="messageType === 'success'"
         [class.bg-gray-900]="messageType === 'error'" 
         [class.text-gray-300]="messageType === 'error'"
         [class.border-gray-700]="messageType === 'error'">
      {{ message }}
    </div>
  }

  <button
    type="submit"
    [disabled]="isLoading"
    class="w-full bg-green-700 text-gray-950 py-4 px-4 text-sm font-medium hover:bg-green-500 transition-colors disabled:opacity-50 mt-auto tracking-wide"
  >
    {{ isLoading ? 'CADASTRANDO...' : 'CADASTRAR' }}
  </button>

  <p class="text-center mt-4 text-xs text-gray-600">
    Já tem uma conta? 
    <button 
      type="button"
      (click)="switchToLogin()" 
      class="text-white hover:text-gray-300 transition-colors ml-1 bg-transparent border-0 p-0 underline-offset-2 hover:underline cursor-pointer"
    >
      Faça login
    </button>
  </p>
</form>
